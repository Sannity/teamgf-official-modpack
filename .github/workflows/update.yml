name: Update | Pipeline
on:
  workflow_dispatch:

env:
  MODPACK_PATH: 'main'

jobs:
  update_mods:
    name: Update Mods
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v26

      - name: Update Mods with Packwiz
        run: nix develop --command packwiz update -a -y
        working-directory: ${{ env.MODPACK_PATH }}

      - name: Push the updated mod list via a Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
            commit-message: "update: updated mods"
            title: 'update: updated mods'
            body: >
              This PR is auto-generated by 
              [create-pull-request](https://github.com/peter-evans/create-pull-request).
